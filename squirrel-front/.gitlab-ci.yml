stages:
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"

build:
  stage: build
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -f ./etc/Dockerfile -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest

deploy:
  stage: deploy
  script:
    - kubectl get deploy -n game
    - kubectl rollout restart deployment/squirrel-front -n game
    - kubectl rollout status deployment/squirrel-front -n game --timeout=180s || true
