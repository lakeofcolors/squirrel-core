apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gitlab-wildcard
  namespace: gitlab
spec:
  secretName: gitlab-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - gitlab.lakeofcolors.com
    - registry.lakeofcolors.com
    - minio.lakeofcolors.com
    - kas.lakeofcolors.com
