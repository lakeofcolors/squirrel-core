repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: jetstack
    url: https://charts.jetstack.io
  - name: metallb
    url: https://metallb.github.io/metallb
  - name: gitlab
    url: https://charts.gitlab.io/
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: sealed-secrets
    url: https://sealed-secrets.github.io/sealed-secrets

releases:
  # 1. Ingress Nginx Controller
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.10.0
    values:
      - controller:
          service:
            loadBalancerIP: 45.9.188.199

  # 2. MetalLB L2 Load Balancer
  - name: metallb
    namespace: metallb-system
    chart: metallb/metallb
    version: 0.14.3
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-n", "metallb-system", "-f", "manifests/metallb-config.yaml"]

  # 3. Cert-Manager (Automatic SSL)
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.14.3
    values:
      - installCRDs: true
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "manifests/clusterissuer.yaml"]

  # 4. Bitnami Sealed Secrets (Encrypted Secrets Management)
  - name: sealed-secrets
    namespace: kube-system
    chart: sealed-secrets/sealed-secrets
    version: 2.15.0
    values:
      - fullnameOverride: sealed-secrets-controller

  # 5. GitLab Self-Hosted
  - name: gitlab
    namespace: gitlab
    chart: gitlab/gitlab
    version: 7.9.2
    values:
      - values/gitlab-values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "manifests/gitlab-wildcard-cert.yaml", "-f", "manifests/gitlab-ingress.yaml"]

  # 6. GitLab Runner
  - name: gitlab-runner
    namespace: ci
    chart: gitlab/gitlab-runner
    version: 0.62.0
    values:
      - values/runner-values.yaml

  # 7. Kube Prometheus Stack (Monitoring & Grafana)
  - name: monitoring
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 57.1.0
    values:
      - values/monitoring-values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "manifests/grafana-ingress.yaml"]
