apiVersion: apps/v1
kind: Deployment
metadata:
  name: squirrel-core
  namespace: game
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: squirrel-core
  template:
    metadata:
      labels:
        app: squirrel-core
    spec:
      containers:
        - name: squirrel-core
          image: gitlab.lakeofcolors.com/squirrel/squirrel-core:latest
          ports:
            - containerPort: 9221

          # ENV VARS
          # envFrom:
          #   - secretRef:
          #       name: squirrel-secrets
          #   - configMapRef:
          #       name: squirrel-config

          # 📈 HEALTHCHECKS
          # readinessProbe:
          #   httpGet:
          #     path: /me
          #     port: 9221
          #   initialDelaySeconds: 5
          #   periodSeconds: 5

          # livenessProbe:
          #   httpGet:
          #     path: /me
          #     port: 9221
          #   initialDelaySeconds: 15
          #   periodSeconds: 10

          # RESOURCE LIMITS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
