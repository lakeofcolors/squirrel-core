image: docker:26

services:
  - docker:26-dind

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

stages:
  - build

build-image:
  stage: build
  tags:
    - k8s
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t $IMAGE .
    - docker push $IMAGE
