variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  IMAGE: $CI_REGISTRY_IMAGE

stages:
  - build
  - migrate
  - deploy

build-image:
  stage: build
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    - docker build -f ./etc/Dockerfile -t $IMAGE:$CI_COMMIT_SHA -t $IMAGE:latest .
    - docker build -f ./etc/Dockerfile.migrations -t $IMAGE:migrations .
    - docker push $IMAGE:$CI_COMMIT_SHA
    - docker push $IMAGE:latest
    - docker push $IMAGE:migrations

migrate:
  stage: migrate
  script:
    - kubectl -n game delete job squirrel-migrations --ignore-not-found
    - kubectl apply -f ./etc/squirrel-migrations.yaml
    - kubectl -n game wait --for=condition=complete job/squirrel-migrations --timeout=120s

deploy:
  stage: deploy
  script:
    - kubectl get deploy -n game
    - kubectl rollout restart deployment/squirrel-core -n game
    - kubectl rollout status deployment/squirrel-core -n game --timeout=180s || true
